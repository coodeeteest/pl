<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Premium Ledger — লগইন</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Inter',-apple-system,sans-serif;
  min-height:100vh;
  background:radial-gradient(ellipse at 20% 10%,#1a1060 0%,#0d0b1e 45%,#060412 100%);
  color:#e8eaf6;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  -webkit-font-smoothing:antialiased;
}

/* ── Ambient orbs ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);opacity:.18;}
.orb1{width:400px;height:400px;background:#6366f1;top:-100px;left:-100px;}
.orb2{width:300px;height:300px;background:#c084fc;bottom:-80px;right:-60px;}
.orb3{width:200px;height:200px;background:#fbbf24;bottom:30%;left:-60px;opacity:.10;}

.login-wrap{
  width:100%;max-width:400px;
  position:relative;z-index:2;
}

/* ── Brand header ── */
.brand-block{text-align:center;margin-bottom:32px;}
.brand-icon{
  width:68px;height:68px;border-radius:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6,#c084fc);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:14px;
  box-shadow:0 12px 32px rgba(99,102,241,.4),0 0 0 1px rgba(255,255,255,.15);
  animation:brandFloat 3s ease-in-out infinite;
}
@keyframes brandFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.brand-name{font-size:24px;font-weight:900;letter-spacing:-1px;color:#fff;}
.brand-name span{color:#a5b4fc;}
.brand-tagline{font-size:12px;color:rgba(165,180,252,.45);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}

/* ── Card ── */
.login-card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(44px) saturate(180%);
  -webkit-backdrop-filter:blur(44px) saturate(180%);
  border:1px solid rgba(255,255,255,.18);
  border-radius:28px;
  padding:30px 26px 26px;
  box-shadow:0 24px 60px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18);
}
.card-title{font-size:16px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:22px;display:flex;align-items:center;gap:8px;}
.card-title i{color:#a78bfa;font-size:15px;}

/* ── Form ── */
.fld{margin-bottom:14px;position:relative;}
.fld label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(165,180,252,.5);margin-bottom:7px;}
.inp-wrap{position:relative;}
.inp-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:rgba(165,180,252,.4);font-size:14px;pointer-events:none;transition:color .2s;}
.inp{
  width:100%;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.15);
  color:#f1f5f9;
  padding:13px 14px 13px 44px;
  border-radius:14px;
  font-size:14px;
  font-family:'Inter',sans-serif;
  outline:none;
  transition:all .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.inp:focus{border-color:rgba(165,180,252,.5);background:rgba(255,255,255,.11);box-shadow:0 0 0 3px rgba(99,102,241,.15),inset 0 1px 0 rgba(255,255,255,.08);}
.inp:focus ~ .inp-icon, .fld:focus-within .inp-icon{color:#a78bfa;}
.inp::placeholder{color:rgba(255,255,255,.2);}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(165,180,252,.4);cursor:pointer;padding:4px;font-size:14px;transition:color .15s;}
.pw-toggle:hover{color:#a5b4fc;}

/* ── Error msg ── */
.err-msg{
  background:rgba(239,68,68,.1);
  border:1px solid rgba(248,113,113,.25);
  border-radius:12px;
  padding:10px 14px;
  font-size:12px;
  color:#fca5a5;
  margin-bottom:14px;
  display:none;
  align-items:center;
  gap:8px;
}
.err-msg.show{display:flex;}

/* ── Submit btn ── */
.btn-login{
  width:100%;
  background:linear-gradient(135deg,#818cf8,#6366f1,#8b5cf6);
  border:1px solid rgba(199,210,254,.3);
  border-radius:50px;
  color:#fff;
  font-size:15px;
  font-weight:700;
  padding:14px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 8px 24px rgba(99,102,241,.35),inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .25s;
  margin-top:6px;
  letter-spacing:.3px;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(99,102,241,.45);}
.btn-login:active{transform:scale(.97);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}

/* ── Footer ── */
.login-footer{text-align:center;margin-top:20px;font-size:11px;color:rgba(165,180,252,.3);letter-spacing:.3px;}

/* ── Spinner ── */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── API check indicator ── */
.api-check{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(165,180,252,.38);margin-bottom:18px;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;}
.api-dot{width:6px;height:6px;border-radius:50%;background:#64748b;flex-shrink:0;}
.api-dot.ok{background:#34d399;box-shadow:0 0 5px #34d399;}
.api-dot.err{background:#f87171;}
.api-dot.checking{background:#fbbf24;animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Demo hint ── */
.demo-hint{
  background:rgba(251,191,36,.06);
  border:1px solid rgba(251,191,36,.15);
  border-radius:12px;
  padding:10px 14px;
  font-size:11px;
  color:rgba(253,230,138,.55);
  margin-top:14px;
  display:flex;align-items:flex-start;gap:8px;
  line-height:1.5;
}
.demo-hint i{color:#fbbf24;font-size:12px;margin-top:1px;flex-shrink:0;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{animation:fadeUp .5s ease both;}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="login-wrap">

  <!-- Brand -->
  <div class="brand-block">
    <div class="brand-icon">💎</div>
    <div class="brand-name">Premium<span>Ledger</span></div>
    <div class="brand-tagline">আর্থিক ব্যবস্থাপনা সিস্টেম</div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="card-title"><i class="fa-solid fa-lock"></i> অ্যাকাউন্টে প্রবেশ করুন</div>

    <!-- API status -->
    <div class="api-check">
      <div class="api-dot checking" id="apiDot"></div>
      <span id="apiTxt">সার্ভার সংযোগ যাচাই হচ্ছে...</span>
    </div>

    <!-- Error -->
    <div class="err-msg" id="errMsg">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span id="errTxt">ভুল ইউজারনেম বা পাসওয়ার্ড।</span>
    </div>

    <!-- Username -->
    <div class="fld">
      <label>ইউজারনেম</label>
      <div class="inp-wrap">
        <input class="inp" type="text" id="l-user" placeholder="আপনার ইউজারনেম" autocomplete="username" autocapitalize="none">
        <i class="fa-solid fa-user inp-icon"></i>
      </div>
    </div>

    <!-- Password -->
    <div class="fld">
      <label>পাসওয়ার্ড</label>
      <div class="inp-wrap">
        <input class="inp" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
        <i class="fa-solid fa-key inp-icon"></i>
        <button class="pw-toggle" type="button" id="pwToggle" onclick="togglePw()" tabindex="-1">
          <i class="fa-solid fa-eye" id="pwIcon"></i>
        </button>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> লগইন করুন
    </button>

    <!-- Demo hint -->
    <div class="demo-hint">
      <i class="fa-solid fa-circle-info"></i>
      <span>Admin একাউন্ট দিয়ে সব কিছু পরিচালনা করুন। সাধারণ ইউজাররা শুধু তথ্য দেখতে পারবেন।</span>
    </div>
  </div>

  <div class="login-footer">© Premium Ledger · সুরক্ষিত সংযোগ</div>
</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbz1SrDi-ou0p3gBAiN7Fe8FfCiV2CQ-Erhn6RTMCiJg2xKWHqznF29t1F9yUZkjD2wl/exec";

// ── Already logged in? ──
(function(){
  try{
    var s=JSON.parse(sessionStorage.getItem("_pls"));
    if(s&&s.token){ window.location.href="index.html"; }
  }catch(e){}
})();

// ── Enter key ──
document.addEventListener("keyup",function(e){
  if(e.key==="Enter") doLogin();
});

// ── Password toggle ──
function togglePw(){
  var inp=document.getElementById("l-pass");
  var ic=document.getElementById("pwIcon");
  if(inp.type==="password"){
    inp.type="text";
    ic.className="fa-solid fa-eye-slash";
  } else {
    inp.type="password";
    ic.className="fa-solid fa-eye";
  }
}

// ── API call ──
async function api(action, params){
  params=params||{};params.action=action;
  try{
    var r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(params),signal:AbortSignal.timeout(12000)});
    if(r.ok) return await r.json();
  }catch(e){}
  try{
    var qs=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);}).join("&");
    var r2=await fetch(API_URL+"?"+qs,{signal:AbortSignal.timeout(12000)});
    if(r2.ok) return await r2.json();
  }catch(e2){}
  return new Promise(function(resolve){
    var cb="__cb_"+Date.now();
    var qs2=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(params[k]);}).join("&");
    var sc=document.createElement("script");
    var t=setTimeout(function(){sc.remove();delete window[cb];resolve({success:false,message:"সংযোগ সময়সীমা অতিক্রম।"});},14000);
    window[cb]=function(d){clearTimeout(t);sc.remove();delete window[cb];resolve(d);};
    sc.src=API_URL+"?"+qs2+"&callback="+cb;
    sc.onerror=function(){clearTimeout(t);sc.remove();delete window[cb];resolve({success:false,message:"সংযোগ ব্যর্থ।"});};
    document.head.appendChild(sc);
  });
}

// ── Ping on load ──
(async function(){
  var dot=document.getElementById("apiDot"),txt=document.getElementById("apiTxt");
  try{
    var r=await api("ping");
    if(r&&r.success){
      dot.className="api-dot ok";
      txt.textContent="সার্ভার সংযুক্ত ✓";
    }else{
      dot.className="api-dot err";
      txt.textContent="সার্ভার সাড়া দিচ্ছে না";
    }
  }catch(e){
    dot.className="api-dot err";
    txt.textContent="সংযোগ ব্যর্থ";
  }
})();

// ── Login ──
async function doLogin(){
  var username=document.getElementById("l-user").value.trim();
  var password=document.getElementById("l-pass").value;
  var btn=document.getElementById("loginBtn");
  var err=document.getElementById("errMsg");
  var errTxt=document.getElementById("errTxt");

  err.classList.remove("show");

  if(!username||!password){
    errTxt.textContent="ইউজারনেম ও পাসওয়ার্ড দিন।";
    err.classList.add("show");
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span> যাচাই হচ্ছে...';

  var res=await api("login",{username:username,password:password});

  if(res&&res.success){
    sessionStorage.setItem("_pls",JSON.stringify({
      username: res.username,
      role:     res.role,
      token:    res.token
    }));
    btn.innerHTML='<i class="fa-solid fa-check"></i> সফল! প্রবেশ করছেন...';
    setTimeout(function(){ window.location.href="index.html"; },600);
  }else{
    btn.disabled=false;
    btn.innerHTML='<i class="fa-solid fa-right-to-bracket"></i> লগইন করুন';
    errTxt.textContent=res.message||"ভুল ইউজারনেম বা পাসওয়ার্ড।";
    err.classList.add("show");
    // shake
    document.querySelector(".login-card").style.animation="shake .3s ease";
    setTimeout(function(){document.querySelector(".login-card").style.animation="";},300);
  }
}
</script>

<style>
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
</style>
</body>
</html>
